app:
  name: secure-support-agent
  host: 0.0.0.0
  port: 8000
  request_timeout_seconds: 30

retrieval:
  backend: stub
  top_k: 5
  index_path: ./artifacts/index

tools:
  allowlist: []
  execution_enabled: false

policies:
  mode: enforce
  bundle_path: ./policies/bundles/default

telemetry:
  enabled: true
  audit_sink: stdout
  audit_log_path: ./artifacts/logs/audit.log

launch_gate:
  strict: true
  policy_path: ./policies/bundles/default/policy.json
  audit_log_path: ./artifacts/logs/audit.jsonl
  eval_summary_glob: ./artifacts/logs/evals/*.summary.json
  required_checks:
    - mandatory_controls
    - policy_artifact
    - retrieval_boundary_config
    - tool_router_enforcement_config
    - kill_switch_state
    - audit_minimums
    - replay_artifact
    - eval_threshold
    - fallback_readiness

secrets:
  provider_policy:
    # local dev may allow env references; production should set false and use managed refs.
    allow_env_fallback: true
    require_managed_providers: false
  # Startup fails closed when required refs are missing.
  required_secret_refs:
    - env:SUPPORT_AGENT_SIGNING_KEY
  # Any sensitive values must be references, not inline secrets.
  sensitive_values:
    mcp_connector_token: vault:kv/support#mcp_connector_token  # provider pattern example
    webhook_secret: sm:support/webhook_secret                 # provider pattern example
