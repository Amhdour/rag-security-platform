name: rag-security-platform CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  adapter-ci:
    name: Adapter verification (tests + smoke + integrity)
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: integration-adapter/pyproject.toml

      - name: Install integration adapter dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./integration-adapter[dev]

      - name: Validate upstream provenance lock
        run: python scripts/validate_upstream_provenance_lock.py

      - name: Run adapter pytest suite
        run: |
          cd integration-adapter
          pytest -q

      - name: Run CI smoke pipeline (demo profile)
        run: |
          cd integration-adapter
          python -m integration_adapter.ci_smoke --profile ci --artifacts-root artifacts/logs-ci-smoke

      - name: Regenerate smoke artifacts for integrity snapshot consistency
        run: |
          cd integration-adapter
          python -m integration_adapter.generate_artifacts --demo --profile ci --artifacts-root artifacts/logs-ci-smoke

      - name: Verify artifact integrity from smoke outputs
        run: |
          cd integration-adapter
          python -m integration_adapter.verify_artifact_integrity --artifacts-root artifacts/logs-ci-smoke
